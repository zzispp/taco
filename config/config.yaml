server:
  host: "127.0.0.1"
  port: 3000

database:
  auto_migrate: true
  url:
  scheme: "postgres"
  host: "localhost"
  port: 5433
  username: "postgres"
  password: "123456"
  name: "postgres"

jwt:
  secret: "hook-local-development-jwt-secret-change-before-deploy"

auth:
  whitelist:
    - methods: ["GET"]
      path_pattern: "/health"
    - methods: ["GET"]
      path_pattern: "/metrics"
    - methods: ["GET"]
      path_pattern: "/openapi.json"
    - methods: ["GET"]
      path_pattern: "/docs"
    - methods: ["GET"]
      path_pattern: "/api/app/configs"
    - methods: ["GET"]
      path_pattern: "/api/auth/me"
    - methods: ["GET"]
      path_pattern: "/api/captcha/config"
    - methods: ["POST"]
      path_pattern: "/api/captcha/challenge"
    - methods: ["POST"]
      path_pattern: "/api/captcha/redeem"
    - methods: ["POST"]
      path_pattern: "/api/auth/sign-in"
    - methods: ["POST"]
      path_pattern: "/api/auth/sign-up"
    - methods: ["POST"]
      path_pattern: "/api/auth/refresh"

cors:
  allowed_origins: ["*"]
  allowed_methods: ["*"]
  allowed_headers: ["*"]
  exposed_headers: ["*"]
  allow_credentials: false
  max_age_seconds:

http:
  request_timeout_ms: 30000
  compression_enabled: true

metrics:
  enabled: true

redis:
  url: "redis://default:@localhost:6380?protocol=resp3"
  scheme: "redis"
  host: "localhost"
  port: 6380
  username: "default"
  password: ""
  database:
  protocol: "resp3"
  key_prefix: "hook"

uploads:
  avatar_directory: "storage/uploads/avatars"

tracing:
  log_level: "info"
  file:
    enabled: false
    directory: "logs"
    prefix: "hook.log"
