server:
  host: "127.0.0.1"
  port: 3000

database:
  auto_migrate: false
  url:
  scheme: "postgres"
  host: "localhost"
  port: 5435
  username: "postgres"
  password:
  name: "postgres"

jwt:
  secret: ""

captcha:
  cloudflare_turnstile:
    secret_key: ""

auth:
  whitelist:
    - methods: ["GET"]
      path_pattern: "/health"
    - methods: ["GET"]
      path_pattern: "/metrics"
    - methods: ["GET"]
      path_pattern: "/openapi.json"
    - methods: ["GET"]
      path_pattern: "/docs"
  refresh_cookie:
    secure: true
    domain:
    path: "/api/auth"

user:
  online_sessions:
    cleanup_interval_ms: 60000
    cleanup_batch_size: 1000

cors:
  allowed_origins: ["https://admin.example.test"]
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
  allowed_headers: ["authorization", "content-type", "accept-language"]
  exposed_headers: ["x-request-id"]
  allow_credentials: true
  max_age_seconds: 3600

http:
  request_timeout_ms: 30000
  compression_enabled: true

metrics:
  enabled: true

audit:
  outbox:
    worker_count: 4
    claim_batch_size: 64
    poll_interval_ms: 250
    lease_duration_ms: 30000
    retry_delay_ms: 5000
    cleanup_interval_ms: 3600000
    cleanup_batch_size: 1000
    processed_retention_days: 7

client_info:
  ip_location:
    request_timeout_ms: 3000

scheduler:
  http_client:
    request_timeout_ms: 30000
  runtime:
    reconcile_interval_ms: 1000

redis:
  url:
  scheme: "redis"
  host: "localhost"
  port: 6381
  username:
  password:
  database:
  protocol: "resp3"
  key_prefix: "hook"

uploads:
  avatar_directory: "storage/uploads/avatars"

tracing:
  log_level: "info"
  file:
    enabled: false
    directory: "logs"
    prefix: "hook.log"
