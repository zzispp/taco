services:
  taco:
    build: .
    environment:
      TACO_CONFIG_ENCRYPTION_KEY: ${TACO_CONFIG_ENCRYPTION_KEY:?TACO_CONFIG_ENCRYPTION_KEY is required}
      TACO_DATA_DIR: /data
    ports:
      - '127.0.0.1:3000:3000'
    restart: unless-stopped
    volumes:
      - taco-data:/data
    healthcheck:
      test: ['CMD', 'curl', '--fail', '--silent', '--show-error', 'http://127.0.0.1:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  taco-data:
